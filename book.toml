[book]
title = "AsmetaL Documentation"
authors = ["Your Name"]
language = "en"

[output.html]
default-theme = "light"
git-repository-url = "https://github.com/asmeta/mdbook2"
edit-url-template = "https://github.com/asmeta/mdbook2/edit/main/{path}"
# additional-js = ["theme/custom.js"]
# additional-css = ["theme/custom.css","theme/highlight.css"]
hash-files = true
smart-punctuation = true
mathjax-support = true
sidebar-header-nav = true

[output.html.search]
limit-results = 20
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
boost-paragraph = 1
expand = true
heading-split-level = 2

[output.html.fold]
enable = true
level = 2
